name: Deploy OmniWeb

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'omniweb/**'
      - '.github/workflows/deploy-omniweb.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "omniweb/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: omniweb

      - name: Build with Next.js
        run: npm run build
        working-directory: omniweb

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./omniweb/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
